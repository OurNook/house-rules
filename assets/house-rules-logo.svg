<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background: deep purple -->
  <circle cx="200" cy="200" r="195" fill="#6457A6"/>
  <!-- Border ring: teal -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="#23F0C7" stroke-width="7"/>

  <!-- Far left fanned card (coral) -->
  <g transform="rotate(-28, 200, 240)" filter="url(#shadow)">
    <rect x="96" y="118" width="82" height="116" rx="10" fill="#Ef767A"/>
    <text x="112" y="144" font-family="Georgia, serif" font-size="17" fill="white" font-weight="bold">A</text>
    <text x="137" y="190" font-family="Georgia, serif" font-size="44" fill="white" text-anchor="middle">♥</text>
  </g>

  <!-- Far right fanned card (yellow) -->
  <g transform="rotate(28, 200, 240)" filter="url(#shadow)">
    <rect x="222" y="118" width="82" height="116" rx="10" fill="#FFE347"/>
    <text x="238" y="144" font-family="Georgia, serif" font-size="17" fill="#6457A6" font-weight="bold">K</text>
    <text x="263" y="190" font-family="Georgia, serif" font-size="44" fill="#6457A6" text-anchor="middle">♣</text>
  </g>

  <!-- Mid left card (muted purple) -->
  <g transform="rotate(-12, 200, 240)" filter="url(#shadow)">
    <rect x="120" y="128" width="82" height="116" rx="10" fill="#7D7ABC"/>
    <text x="136" y="154" font-family="Georgia, serif" font-size="17" fill="white" font-weight="bold">7</text>
    <text x="161" y="200" font-family="Georgia, serif" font-size="44" fill="white" text-anchor="middle">♦</text>
  </g>

  <!-- Mid right card (teal) -->
  <g transform="rotate(12, 200, 240)" filter="url(#shadow)">
    <rect x="198" y="128" width="82" height="116" rx="10" fill="#23F0C7"/>
    <text x="214" y="154" font-family="Georgia, serif" font-size="17" fill="#6457A6" font-weight="bold">Q</text>
    <text x="239" y="200" font-family="Georgia, serif" font-size="44" fill="#6457A6" text-anchor="middle">♠</text>
  </g>

  <!-- Centre house card (white face) -->
  <rect x="142" y="172" width="116" height="130" rx="8" fill="white" filter="url(#shadow)"/>

  <!-- Roof: coral -->
  <polygon points="128,178 200,100 272,178" fill="#Ef767A" filter="url(#shadow)"/>
  <!-- Roof highlight edge -->
  <polygon points="128,178 200,100 272,178" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>

  <!-- Chimney: yellow -->
  <rect x="238" y="110" width="16" height="38" rx="3" fill="#FFE347"/>
  <rect x="235" y="107" width="22" height="9" rx="2" fill="#FFE347"/>

  <!-- Door: deep purple -->
  <rect x="179" y="234" width="42" height="68" rx="5" fill="#6457A6"/>
  <!-- Door knob: yellow -->
  <circle cx="214" cy="270" r="4" fill="#FFE347"/>

  <!-- Left window: teal -->
  <rect x="150" y="196" width="28" height="26" rx="3" fill="#23F0C7"/>
  <line x1="164" y1="196" x2="164" y2="222" stroke="white" stroke-width="2"/>
  <line x1="150" y1="209" x2="178" y2="209" stroke="white" stroke-width="2"/>

  <!-- Right window: teal -->
  <rect x="222" y="196" width="28" height="26" rx="3" fill="#23F0C7"/>
  <line x1="236" y1="196" x2="236" y2="222" stroke="white" stroke-width="2"/>
  <line x1="222" y1="209" x2="250" y2="209" stroke="white" stroke-width="2"/>

  <!-- Tally marks on house card: muted purple -->
  <g transform="translate(155, 250)">
    <line x1="0"  y1="0" x2="0"  y2="15" stroke="#7D7ABC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8"  y1="0" x2="8"  y2="15" stroke="#7D7ABC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="0" x2="16" y2="15" stroke="#7D7ABC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="0" x2="24" y2="15" stroke="#7D7ABC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-2" y1="11" x2="26" y2="4" stroke="#6457A6" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
